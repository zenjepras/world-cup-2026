name: Update results

on:
  schedule:
    - cron: "15 */2 * * *"   # every 2 hours, on the quarter hour
  workflow_dispatch: {}       # adds a manual "Run workflow" button

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest results
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: node scripts/fetch-results.js

      - name: Commit if changed
        run: |
          git config user.name "results-bot"
          git config user.email "actions@users.noreply.github.com"
          git add results.json
          git diff --staged --quiet || (git commit -m "Update results" && git push)
